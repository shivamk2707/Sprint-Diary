name: sprint_diary
description: "A personal training diary application for a single athlete, focusing on simplicity and speed."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.1.4

  # Backend & Auth
  supabase_flutter: ^2.5.4

  # UI & Styling
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Data Visualization
  fl_chart: ^0.68.0

  # Calendar
  table_calendar: ^3.1.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3

  # Hardware / System
  image_picker: ^1.1.1
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Mocking for tests
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
